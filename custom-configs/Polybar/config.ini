include-file = ~/.config/custom-themes/polybar-theme.ini

; Standard pixel gaps:
; icon-text = 3px
; control   = 6px
; item      = 8px
; module    = 10px
; section   = 12px

[bar/main]
monitor = ${env:MONITOR:HDMI-0}
width = 100%
height = 28
radius = 0
fixed-center = true

top = yes
bottom = no
override-redirect = false
wm-restack = i3

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 0
border-size = 0

padding-left = 1
padding-right = 1

module-margin-left = 0
module-margin-right = 0

; T1 = base / workspace
; T2 = medium text
; T3 = small separator
; T4 = small title/media text
; T5 = large icon
; T6 = medium icon
; T7 = small audio text / small active media icon
font-0 = JetBrainsMono Nerd Font:style=Regular:size=12;3
font-1 = JetBrainsMono Nerd Font:style=Regular:size=11;3
font-2 = JetBrainsMono Nerd Font:style=Regular:size=9;3
font-3 = JetBrainsMono Nerd Font:style=Regular:size=10;3
font-4 = JetBrainsMono Nerd Font:style=Regular:size=16;4
font-5 = JetBrainsMono Nerd Font:style=Regular:size=14;4
font-6 = JetBrainsMono Nerd Font:style=Regular:size=9;3

modules-left = i3 sep title
modules-center = pulseaudio sep audio-player sep shortcuts
modules-right = weather sep date sep screen-record sep tray audio-output notifications power

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

[bar/secondary]
inherit = bar/main

[module/sep]
type = custom/text
label = "%{T3}│%{T-}"
label-foreground = ${colors.foreground-alt}
label-padding = 1

[module/i3]
type = internal/i3
format = <label-state>
index-sort = true
wrapping-scroll = false
strip-wsnumbers = false
enable-click = true
enable-scroll = false
pin-workspaces = false

label-focused = "%{T1}●%{O3}%index%%{T-}"
label-focused-padding = 0
label-focused-foreground = ${colors.workspace-focused}

label-unfocused = "%{T1}●%{O3}%index%%{T-}"
label-unfocused-padding = 0
label-unfocused-foreground = ${colors.workspace-unfocused}

label-visible = "%{T1}●%{O3}%index%%{T-}"
label-visible-padding = 0
label-visible-foreground = ${colors.workspace-visible}

label-urgent = "%{T1}●%{O3}%index%%{T-}"
label-urgent-padding = 0
label-urgent-foreground = ${colors.workspace-urgent}

label-mode = "%mode%"
label-mode-padding = 1
label-mode-foreground = ${colors.warning}

label-separator = "%{O8}"
label-separator-padding = 0


[module/title]
type = internal/xwindow
format = <label>
format-prefix = " "
format-prefix-foreground = ${colors.primary}
format-prefix-padding = 0
format-padding = 1

label = "%{O3}%{T4}%title:0:80:...%%{T-}"
label-foreground = ${colors.foreground}
label-empty = "%{O3}%{T4}desktop%{T-}"
label-empty-foreground = ${colors.foreground-alt}


[module/audio-player]
type = custom/script
exec = AUDIO_PLAYER_INTERVAL=0.5 ~/.config/polybar/scripts/audio-player.sh
tail = true
format = <label>
format-padding = 1
label = "%output%"


[module/shortcuts]
type = custom/script
exec = ~/.config/polybar/scripts/shortcuts.sh
tail = false
interval = 3600
format = <label>
format-padding = 1
label = "%output%"


[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = false
interval = 1

format-volume = <ramp-volume><label-volume>
format-volume-padding = 1

ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-font = 6
ramp-volume-foreground = ${colors.primary}

label-volume = "%{O20}%percentage%%"
label-volume-foreground = ${colors.foreground}

format-muted = <label-muted>
format-muted-padding = 1
label-muted = "×"
label-muted-font = 6
label-muted-foreground = ${colors.alert}

click-right = pavucontrol


[module/weather]
type = custom/script
exec = ~/.config/polybar/scripts/weather-openmeteo.sh
interval = 600
format = <label>
format-padding = 1
label = "%output%"


[module/audio-output]
type = custom/script
exec = ~/.config/polybar/scripts/audio-output.sh print
tail = false
interval = 5
format = <label>
format-padding = 1
label = "%output%"
click-left = ~/.config/polybar/scripts/audio-output.sh menu


[module/notifications]
type = custom/script
exec = ~/.config/polybar/scripts/notification-history.sh print
tail = false
interval = 30
format = <label>
format-padding = 1
label = "%output%"
click-left = ~/.config/polybar/scripts/notification-history.sh menu
click-right = ~/.config/polybar/scripts/notification-history.sh clear


[module/date]
type = internal/date
interval = 1
time = "%H:%M %d.%m.%Y"

format = <label>
format-prefix = " "
format-prefix-foreground = ${colors.primary}
format-padding = 1

label = "%{A1:~/.config/polybar/scripts/calendar-menu.sh:}%{O3}%time%%{A}"
label-foreground = ${colors.foreground}

click-left = ~/.config/polybar/scripts/calendar-menu.sh


[module/screen-record]
type = custom/script
exec = ~/.config/polybar/scripts/screen-record.sh status
tail = false
interval = 1
format = <label>
format-padding = 1
label = "%output%"
click-left = ~/.config/polybar/scripts/screen-record.sh toggle


[module/power]
type = custom/text
label = " "
label-font = 6
label-padding = 1
label-foreground = ${colors.alert}
click-left = ~/.config/polybar/scripts/power-menu.sh


[module/tray]
type = internal/tray
format = <tray>
tray-padding = 3px
tray-spacing = 4px
tray-size = 65%


[settings]
screenchange-reload = true
compositing-background = over
compositing-foreground = over
compositing-overline = over
compositing-border = over

[global/wm]
margin-top = 0
margin-bottom = 0
