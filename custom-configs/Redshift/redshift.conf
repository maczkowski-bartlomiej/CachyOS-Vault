; ~/.config/redshift/redshift.conf
; Redshift automatically transitions between day and night temperatures based on
; the configured location. Coordinates match the Polybar weather default.

[redshift]
temp-day=6500
temp-night=4200
transition=1
brightness-day=1.0
brightness-night=0.95
gamma=1.0
adjustment-method=randr
location-provider=manual

[manual]
lat=54.16
lon=19.40
