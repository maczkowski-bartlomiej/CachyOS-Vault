# ~/.config/picom/picom.conf

# =============================================================================
# Backend / rendering
# =============================================================================

backend = "glx";
vsync = true;

# NVIDIA + GLX: your diagnostics explicitly said to enable this.
# Official docs also note this is needed on NVIDIA GLX systems for some users.
xrender-sync-fence = true;

# Better performance. If you see flickering/artifacts, change this to false.
use-damage = true;

# Better fullscreen/game performance. May cause flicker when entering/leaving
# fullscreen on some systems.
unredir-if-possible = true;
unredir-if-possible-delay = 0;

# Keep EWMH fullscreen detection enabled.
no-ewmh-fullscreen = false;

# Keep this disabled unless you explicitly need runtime scripting control.
dbus = false;


# =============================================================================
# Logging
# =============================================================================

log-level = "warn";
show-all-xerrors = false;


# =============================================================================
# Shadows
# =============================================================================
# Global shadow support is enabled, but actual shadow placement is controlled
# by rules below. This avoids shadows on tiled normal windows, Polybar, Rofi,
# screenshot tools, etc.

shadow = true;
shadow-radius = 12;
shadow-opacity = 0.25;
shadow-offset-x = -7;
shadow-offset-y = -7;

shadow-red = 0.0;
shadow-green = 0.0;
shadow-blue = 0.0;


# =============================================================================
# Fading
# =============================================================================

fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 10;

no-fading-openclose = false;
no-fading-destroyed-argb = false;


# =============================================================================
# Corners
# =============================================================================
# Global square corners. Rofi handles its own rounding in config.rasi.

corner-radius = 0;
detect-rounded-corners = false;


# =============================================================================
# Opacity / dimming
# =============================================================================
# Keep application opacity mostly controlled by the application/theme itself.
# Inactive dim is handled by the modern window rules below.

detect-client-opacity = true;
frame-opacity = 1.0;
inactive-dim-fixed = false;


# =============================================================================
# Blur
# =============================================================================
# Disabled per your decision. Keeping an explicit blur block documents intent.

blur:
{
    method = "none";
};


# =============================================================================
# Focus detection
# =============================================================================

detect-transient = true;
detect-client-leader = true;

use-ewmh-active-win = false;


# =============================================================================
# Animations
# =============================================================================
# Picom v13 supports official animation scripts/presets.
# Keep these subtle: small scale + fade, not aggressive "flying" windows.

animations = (
    {
        triggers = [ "open", "show" ];
        preset = "appear";
        duration = 0.12;
        scale = 0.98;
    },
    {
        triggers = [ "close", "hide" ];
        preset = "disappear";
        duration = 0.10;
        scale = 0.98;
    }
);


# =============================================================================
# Window rules
# =============================================================================
# Modern replacement for:
# - opacity-rule
# - shadow-exclude
# - fade-exclude
# - focus-exclude
# - blur-background-exclude
# - wintypes
# - corner-radius-rules
#
# Rules are applied in order. If the same option is set more than once, the
# later matching rule wins.

rules = (
    # -------------------------------------------------------------------------
    # Defaults
    # -------------------------------------------------------------------------

    {
        opacity = 1.0;
        dim = 0.04;
        corner-radius = 0;
        blur-background = false;
        shadow = false;
        fade = true;
    },

    # Active/focused windows should not be dimmed.
    {
        match = "focused || group_focused || wmwin || override_redirect";
        dim = 0.0;
        opacity = 1.0;
    },

    # Fullscreen windows/games: no effects.
    {
        match = "fullscreen";
        opacity = 1.0;
        dim = 0.0;
        corner-radius = 0;
        blur-background = false;
        shadow = false;
        fade = false;
        unredir = true;
    },

    # -------------------------------------------------------------------------
    # Screenshot / selection tools
    # -------------------------------------------------------------------------

    {
        match = "class_g = 'slop' || class_g = 'maim' || class_g = 'flameshot' || name *?= 'flameshot'";
        opacity = 1.0;
        dim = 0.0;
        corner-radius = 0;
        blur-background = false;
        shadow = false;
        fade = false;
    },

    # -------------------------------------------------------------------------
    # Bars / launchers / terminal
    # -------------------------------------------------------------------------

    {
        match = "class_g = 'Polybar'";
        opacity = 1.0;
        dim = 0.0;
        corner-radius = 0;
        blur-background = false;
        shadow = false;
        fade = false;
        clip-shadow-above = true;
    },

    {
        match = "class_g = 'Rofi'";
        opacity = 1.0;
        dim = 0.0;
        corner-radius = 0;
        blur-background = false;
        shadow = false;
        fade = true;
    },

    # -------------------------------------------------------------------------
    # Menus / tooltips
    # -------------------------------------------------------------------------

    {
        match = "window_type = 'popup_menu' || window_type = 'dropdown_menu' || window_type = 'menu'";
        opacity = 0.8;
        dim = 0.0;
        blur-background = false;
        shadow = true;
        full-shadow = false;
        fade = true;
    },

    {
        match = "window_type = 'tooltip'";
        opacity = 0.75;
        dim = 0.0;
        blur-background = false;
        shadow = true;
        full-shadow = false;
        fade = true;
    },

    # -------------------------------------------------------------------------
    # Dialog / utility windows
    # -------------------------------------------------------------------------
    # Subtle shadows only on floating/dialog-ish windows.

    {
        match = "window_type = 'dialog' || window_type = 'utility' || window_type = 'splash'";
        opacity = 1.0;
        corner-radius = 0;
        blur-background = false;
        shadow = true;
        full-shadow = false;
        fade = true;
    },

    # -------------------------------------------------------------------------
    # Client-side decorations / shaped windows
    # -------------------------------------------------------------------------

    {
        match = "_GTK_FRAME_EXTENTS@";
        shadow = false;
        blur-background = false;
    }
);
