# ~/.config/alacritty/alacritty.toml

# -----------------------------------------------------------------------------
# General
# -----------------------------------------------------------------------------

[general]
# Keep theme colors generated by your custom theme builder.
import = ["~/.config/custom-themes/alacritty-theme.toml"]

# Start in the parent process directory.
working_directory = "None"

# Reload config changes automatically where supported.
live_config_reload = true

# Allow `alacritty msg ...` IPC.
ipc_socket = true


# -----------------------------------------------------------------------------
# Environment
# -----------------------------------------------------------------------------

[env]
# You verified that the Alacritty terminfo exists on this system.
TERM = "alacritty"

# Keep X11 scaling stable under i3/X11.
WINIT_X11_SCALE_FACTOR = "1.0"


# -----------------------------------------------------------------------------
# Window
# -----------------------------------------------------------------------------

[window]
# Let i3 decide size and placement.
dimensions = { columns = 0, lines = 0 }
position = "None"

# Keep a little space between terminal content and the i3 border.
padding = { x = 4, y = 4 }
dynamic_padding = false

decorations_theme_variant = "Dark"

# Fully opaque. Picom blur/transparency intentionally disabled here.
opacity = 1.0
blur = false

# Normal window; no fullscreen/maximized behavior from Alacritty.
startup_mode = "Windowed"

# Fallback title, but allow shell/programs to update it dynamically.
title = "Alacritty@CachyOS"
dynamic_title = true

# Keep stable class for i3 rules.
class = { instance = "Alacritty", general = "Alacritty" }

# Keep normal stacking. i3 should manage focus/layers.
level = "Normal"

# Useful for tiled WMs: resize in cell-size increments.
resize_increments = true


# -----------------------------------------------------------------------------
# Scrolling
# -----------------------------------------------------------------------------

[scrolling]
history = 10000
multiplier = 3


# -----------------------------------------------------------------------------
# Font
# -----------------------------------------------------------------------------

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }
bold_italic = { family = "JetBrainsMono Nerd Font", style = "Bold Italic" }

size = 12.0

# Keep default spacing and glyph position.
offset = { x = 0, y = 0 }
glyph_offset = { x = 0, y = 0 }

# Keep Alacritty's built-in box/powerline drawing support.
builtin_box_drawing = true


# -----------------------------------------------------------------------------
# Colors
# -----------------------------------------------------------------------------
# Actual palette stays in:
# ~/.config/custom-themes/alacritty-theme.toml

[colors]
# Preserve your current behavior: bold text uses bright palette variants.
draw_bold_text_with_bright_colors = true

# Opacity applies only to default background, not every colored cell.
transparent_background_colors = false


# -----------------------------------------------------------------------------
# Bell
# -----------------------------------------------------------------------------

[bell]
# Fully disabled.
animation = "Linear"
duration = 0
command = "None"


# -----------------------------------------------------------------------------
# Selection
# -----------------------------------------------------------------------------

[selection]
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"

# Selecting text copies it automatically.
save_to_clipboard = true


# -----------------------------------------------------------------------------
# Cursor
# -----------------------------------------------------------------------------

[cursor]
# Underline cursor, blinking enabled.
style = { shape = "Underline", blinking = "Always" }

# No separate vi-mode cursor style.
vi_mode_style = "None"

# Blinking behavior.
blink_interval = 750
blink_timeout = 0

unfocused_hollow = true
thickness = 0.15


# -----------------------------------------------------------------------------
# Terminal
# -----------------------------------------------------------------------------

[terminal]
# Force zsh login shell.
shell = { program = "/bin/zsh", args = ["-l"] }

# Recommended clipboard mode: remote/programs can copy via OSC52,
# but cannot read/paste from your system clipboard.
osc52 = "OnlyCopy"


# -----------------------------------------------------------------------------
# Mouse
# -----------------------------------------------------------------------------

[mouse]
hide_when_typing = true

bindings = [
  # Keep middle-click paste from X selection buffer.
  { mouse = "Middle", mods = "None", action = "PasteSelection" },
]


# -----------------------------------------------------------------------------
# Keyboard
# -----------------------------------------------------------------------------
# Keep Alacritty's useful defaults where possible:
# - Ctrl+Shift+C / Ctrl+Shift+V
# - Ctrl+Shift+F / Ctrl+Shift+B search
# - Shift+PageUp / Shift+PageDown scrolling
# - Ctrl+= / Ctrl+- / Ctrl+0 font size controls
#
# Explicit overrides below only document intent and disable vi-mode entry.

[keyboard]
bindings = [
  # Clear warning/error notices.
  { key = "L", mods = "Control", action = "ClearLogNotice" },

  # Ctrl+L should still clear terminal screen outside vi/search modes.
  { key = "L", mods = "Control", mode = "~Vi|~Search", chars = "\f" },

  # Explicit clipboard bindings.
  { key = "Paste", mods = "None", action = "Paste" },
  { key = "Copy", mods = "None", action = "Copy" },
  { key = "V", mods = "Control|Shift", mode = "~Vi", action = "Paste" },
  { key = "C", mods = "Control|Shift", action = "Copy" },

  # Search.
  { key = "F", mods = "Control|Shift", mode = "~Search", action = "SearchForward" },
  { key = "B", mods = "Control|Shift", mode = "~Search", action = "SearchBackward" },

  # Scrollback navigation.
  { key = "PageUp", mods = "Shift", mode = "~Alt", action = "ScrollPageUp" },
  { key = "PageDown", mods = "Shift", mode = "~Alt", action = "ScrollPageDown" },
  { key = "Home", mods = "Shift", mode = "~Alt", action = "ScrollToTop" },
  { key = "End", mods = "Shift", mode = "~Alt", action = "ScrollToBottom" },

  # Font size controls.
  { key = "0", mods = "Control", action = "ResetFontSize" },
  { key = "=", mods = "Control", action = "IncreaseFontSize" },
  { key = "+", mods = "Control", action = "IncreaseFontSize" },
  { key = "NumpadAdd", mods = "Control", action = "IncreaseFontSize" },
  { key = "-", mods = "Control", action = "DecreaseFontSize" },
  { key = "NumpadSubtract", mods = "Control", action = "DecreaseFontSize" },

  # Disable default vi-mode entry binding: Ctrl+Shift+Space.
  { key = "Space", mods = "Control|Shift", mode = "~Search", action = "None" },
  { key = "Space", mods = "Control|Shift", mode = "Vi|~Search", action = "None" },
]
