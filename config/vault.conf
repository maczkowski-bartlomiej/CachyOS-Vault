# CachyOS-Vault machine configuration
# =============================================================================
# Single source of truth for the machine-specific values that used to be
# hardcoded across the repo (primary display, drive UUIDs, mount points).
#
# Edit the values below for your machine, then regenerate the derived files:
#
#     scripts/build-config
#
# That command rewrites, from the values here:
#   - custom-tweaks/drive-automounts/fstab-drive-automounts
#   - custom-tweaks/gtk-bookmarks/bookmarks
#   - custom-configs/Polybar/monitor.conf
#
# This file is sourced by Bash, so keep valid shell assignments only.

# -----------------------------------------------------------------------------
# Display
# -----------------------------------------------------------------------------
# xrandr connector name of the monitor that should be the primary/main output.
# Used by Polybar (main bar placement) and set as the X primary at launch.
# Find your connector names with: xrandr --query | awk '/ connected/ {print $1}'
VAULT_PRIMARY_MONITOR="HDMI-0"

# -----------------------------------------------------------------------------
# Drive automounts
# -----------------------------------------------------------------------------
# One entry per managed drive, pipe-delimited:
#   "UUID|MOUNTPOINT|FSTYPE|OPTIONS|BOOKMARK_LABEL"
# OPTIONS is copied verbatim into /etc/fstab; BOOKMARK_LABEL is the GTK
# bookmark name. Set BOOKMARK_LABEL empty to skip creating a bookmark.
VAULT_DRIVES=(
    "F85EFF175EFECCFE|/mnt/dev|ntfs3|rw,uid=1000,gid=1000,umask=022,windows_names,nofail,x-systemd.automount,x-systemd.idle-timeout=10min,x-systemd.device-timeout=5s|Dev"
    "4EBE9588BE95696B|/mnt/dev-data|ntfs3|rw,uid=1000,gid=1000,umask=022,windows_names,nofail,x-systemd.automount,x-systemd.idle-timeout=10min,x-systemd.device-timeout=5s|Dev Data"
    "16654759-f0f4-4933-bf8d-223be0319a42|/mnt/data-hdd|btrfs|rw,noatime,compress=zstd:1,nofail,x-systemd.automount,x-systemd.idle-timeout=10min,x-systemd.device-timeout=5s|Data HDD"
)
